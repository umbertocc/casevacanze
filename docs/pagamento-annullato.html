<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Pagamento Annullato | Torre Pali Vacanze</title>
  <style>
    :root {
      --bg-1: #0f3957;
      --bg-2: #2d6f95;
      --card: #ffffff;
      --text: #123;
      --muted: #5f7385;
      --warn: #8a5a00;
      --warn-soft: #fff6e4;
      --accent: #0b5f8a;
      --danger: #9b2c2c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 80% 20%, #7ab2d0 0%, transparent 40%),
                  linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .top {
      background: linear-gradient(135deg, #8a5a00 0%, #c48a19 100%);
      color: #fff;
      padding: 30px 24px;
      text-align: center;
    }

    .top h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.3vw, 2rem);
      letter-spacing: 0.3px;
    }

    .top p {
      margin: 10px 0 0;
      opacity: 0.95;
    }

    .content {
      padding: 26px;
      display: grid;
      gap: 16px;
    }

    .badge {
      background: var(--warn-soft);
      color: var(--warn);
      border: 1px solid #f0d7a6;
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 600;
    }

    .note {
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-danger {
      background: #fff3f3;
      color: var(--danger);
      border-color: #f0baba;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <section class="top">
      <h1>Pagamento non completato</h1>
      <p>Nessun addebito confermato. Puoi riprovare quando vuoi.</p>
    </section>

    <section class="content">
      <div class="badge">Prenotazione non confermata: torna alla pagina di prenotazione per ripetere il pagamento.</div>
      <p class="note">Se hai avuto errori tecnici o dubbi, scrivici su WhatsApp: ti aiutiamo subito.</p>

      <div class="actions">
        <a class="btn btn-primary" href="/prenotazione1.html">Riprova pagamento</a>
        <a class="btn btn-danger" href="https://wa.me/393886587080?text=Ciao%2C%20ho%20avuto%20un%20problema%20durante%20il%20pagamento%20della%20caparra.">Assistenza WhatsApp</a>
      </div>
    </section>
  </main>
</body>
</html>
