<!-- navbar.html: componente riutilizzabile per la navbar -->
<nav class="navbar">
  <div class="navbar-container" style="position:relative;">
    <a href="/" class="navbar-brand">🏝️ Torre Pali Vacanze</a>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Apri menu di navigazione" tabindex="0" style="position:absolute;top:10px;right:10px;z-index:2001;display:flex;">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="navbar-menu" id="navbarMenu">
      <li><a href="/" onclick="closeMenu()">Home</a></li>
      <li><a href="torre-pali" onclick="closeMenu()">Torre Pali</a></li>
      <li><a href="recensioni" onclick="closeMenu()">⭐ Recensioni</a></li>
      <li><a href="faq" onclick="closeMenu()">FAQ</a></li>
      <li><a href="preventivo" onclick="closeMenu()">Preventivo</a></li>
      <li><a href="contatti" onclick="closeMenu()">Contatti</a></li>
    </ul>
  </div>
</nav>

<script>
// Menu Hamburger
function toggleMenu() {
  const menu = document.getElementById('navbarMenu');
  menu.classList.toggle('active');
}

function closeMenu() {
  const menu = document.getElementById('navbarMenu');
  menu.classList.remove('active');
  // Chiudi tutte le dropdown su mobile
  if (window.innerWidth <= 768) {
    const dropdowns = document.querySelectorAll('.dropdown.active');
    dropdowns.forEach(function(drop) {
      drop.classList.remove('active');
    });
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const dropdownToggles = document.querySelectorAll('.dropdown-toggle');
  dropdownToggles.forEach(function(toggle) {
    toggle.addEventListener('click', function(e) {
      if (window.innerWidth <= 768) {
        e.preventDefault();
        e.stopPropagation();
        const parentDropdown = this.closest('.dropdown');
        if (parentDropdown) {
          parentDropdown.classList.toggle('active');
        }
      }
    });
    // Supporto touch
    toggle.addEventListener('touchstart', function(e) {
      if (window.innerWidth <= 768) {
        e.preventDefault();
        e.stopPropagation();
        const parentDropdown = this.closest('.dropdown');
        if (parentDropdown) {
          parentDropdown.classList.toggle('active');
        }
      }
    }, { passive: false });
  });
});

// Chiudi menu quando si clicca fuori
  document.addEventListener('click', function(event) {
    const navbar = document.querySelector('.navbar');
    const menu = document.getElementById('navbarMenu');
    const dropdown = document.querySelector('.dropdown');
    if (!navbar.contains(event.target) && menu.classList.contains('active')) {
      menu.classList.remove('active');
      if (dropdown) dropdown.classList.remove('active');
    }
  });
</script>
