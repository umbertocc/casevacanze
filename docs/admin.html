<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Admin - Gestione Richieste</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e3e9f7 0%, #f7fafd 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            width: 100vw;
            min-height: 80vh;
            margin: 0;
            background: #fff;
            padding: 40px 4vw 32px 4vw;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        h1 {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }
        h2 {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 24px;
            color: #2d3a4a;
        }
        .login-form, .admin-panel {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            margin: 12px 0 18px 0;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            font-size: 1rem;
            background: #f7fafd;
            transition: border 0.2s;
        }
        .login-form input:focus {
            border: 1.5px solid #007bff;
            outline: none;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(90deg, #007bff 60%, #4f8cff 100%);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,123,255,0.07);
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn:disabled {
            background: #b0b8c9;
            cursor: not-allowed;
        }
        label {
            font-weight: 500;
            color: #2d3a4a;
            margin-bottom: 6px;
            display: block;
        }
        #casaSelect {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cfd8dc;
            font-size: 1rem;
            margin-bottom: 24px;
            background: #f7fafd;
        }
        .requests-table {
            width: 98%;
            max-width: 1100px;
            margin: 18px auto 0 auto;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(60,80,120,0.07);
            font-size: 1.08rem;
            display: block;
        }
        .requests-table th, .requests-table td {
            border: 1px solid #e3e9f7;
            padding: 14px 14px;
            text-align: left;
            min-width: 120px;
        }
        .requests-table th {
            background: #f0f4fa;
            color: #2d3a4a;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .requests-table tr:nth-child(even) {
            background: #f7fafd;
        }
        .requests-table tr:hover {
            background: #e3e9f7;
        }
        .actions button {
            margin-right: 6px;
        }
        .notification {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 18px;
            display: none;
            font-size: 1rem;
        }
        @media (max-width: 1100px) {
            .requests-table {
                width: 99vw;
            }
        }
        @media (max-width: 800px) {
            .container {
                width: 100vw;
                padding: 12px 2vw 18px 2vw;
            }
            .login-form, .admin-panel {
                max-width: 100vw;
                padding: 0;
            }
            .requests-table th, .requests-table td {
                padding: 7px 4px;
                font-size: 0.97rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Area Admin</h1>
        <div class="notification" id="notification"></div>
        <div class="login-form" id="loginForm">
            <input type="password" id="adminPassword" placeholder="Password admin">
            <button class="btn" onclick="loginAdmin()">Accedi</button>
        </div>
        <div class="admin-panel" id="adminPanel" style="display:none;">
            <h2>Prenotazioni per Casa</h2>
            <label for="casaSelect">Seleziona una casa:</label>
            <select id="casaSelect" style="margin-bottom:20px; width:100%; padding:8px;"></select>
            <table class="requests-table" id="prenotazioniTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Check-in</th>
                        <th>Check-out</th>
                        <th>Ospite</th>
                        <th>Email</th>
                        <th>Note</th>
                        <th>Creato il</th>
                    </tr>
                </thead>
                <tbody id="prenotazioniBody">
                    <!-- Prenotazioni caricate qui -->
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const API_BASE = 'https://demo-mail-993653817397.europe-west8.run.app'; // URL reale backend Java
        let adminToken = null;

        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 3000);
        }

        function loginAdmin() {
            const pwd = document.getElementById('adminPassword').value;
            fetch(`${API_BASE}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            })
            .then(res => res.json())
            .then(data => {
                if (data.token) {
                    adminToken = data.token;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadCase();
                } else {
                    showNotification('Password errata!');
                }
            })
            .catch(() => showNotification('Errore di connessione.'));
        }

        // Carica la lista delle case e popola il dropdown
        function loadCase() {
            fetch(`${API_BASE}/api/case`)
                .then(res => res.json())
                .then(caseList => {
                    const select = document.getElementById('casaSelect');
                    select.innerHTML = '';
                    caseList.forEach(casa => {
                        const opt = document.createElement('option');
                        opt.value = casa.id;
                        opt.textContent = casa.nome;
                        select.appendChild(opt);
                    });
                    if (caseList.length > 0) {
                        loadPrenotazioni(caseList[0].id);
                    }
                })
                .catch(() => showNotification('Errore nel caricamento delle case.'));
        }

        // Carica le prenotazioni per la casa selezionata
        function loadPrenotazioni(casaId) {
            fetch(`${API_BASE}/api/prenotazioni/casa/${casaId}`)
                .then(res => res.json())
                .then(prenotazioni => {
                    const body = document.getElementById('prenotazioniBody');
                    body.innerHTML = '';
                    prenotazioni.forEach(p => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${p.id}</td>
                            <td>${p.checkIn}</td>
                            <td>${p.checkOut}</td>
                            <td>${p.ospiteNome ?? ''}</td>
                            <td>${p.emailOspite ?? ''}</td>
                            <td>${p.note ?? ''}</td>
                            <td>${p.createdAt ? new Date(p.createdAt).toLocaleString() : ''}</td>
                        `;
                        body.appendChild(tr);
                    });
                })
                .catch(() => showNotification('Errore nel caricamento prenotazioni.'));
        }

        // Cambia casa selezionata
        document.addEventListener('DOMContentLoaded', function() {
            const select = document.getElementById('casaSelect');
            if (select) {
                select.addEventListener('change', function() {
                    loadPrenotazioni(this.value);
                });
            }
        });

        // --- Funzioni richieste admin rimosse ---
    </script>
</body>
</html>
