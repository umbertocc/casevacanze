<!DOCTYPE html>
<html lang="it">
<head>
        <script>
        const API_BASE = 'https://demo-mail-993653817397.europe-west8.run.app'; // URL reale backend Java
        let adminToken = null;

        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 3000);
        }

        function loginAdmin() {
            const pwd = document.getElementById('adminPassword').value;
            fetch(`${API_BASE}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            })
            .then(res => res.json())
            .then(data => {
                if (data.token) {
                    adminToken = data.token;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadCase();
                } else {
                    showNotification('Password errata!');
                }
            })
            .catch(() => showNotification('Errore di connessione.'));
        }

        // Carica la lista delle case e popola il dropdown
        function loadCase() {
            fetch(`${API_BASE}/api/case`)
                .then(res => res.json())
                .then(caseList => {
                    const select = document.getElementById('casaSelect');
                    select.innerHTML = '';
                    caseList.forEach(casa => {
                        const opt = document.createElement('option');
                        opt.value = casa.id;
                        opt.textContent = casa.nome;
                        select.appendChild(opt);
                    });
                    if (caseList.length > 0) {
                        loadPrenotazioni(caseList[0].id);
                    }
                })
                .catch(() => showNotification('Errore nel caricamento delle case.'));
        }

        // Carica le prenotazioni per la casa selezionata
        function loadPrenotazioni(casaId) {
            fetch(`${API_BASE}/api/prenotazioni/casa/${casaId}`)
                .then(res => res.json())
                .then(prenotazioni => {
                    const body = document.getElementById('prenotazioniBody');
                    body.innerHTML = '';
                    prenotazioni.forEach(p => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${p.id}</td>
                            <td>${p.checkIn}</td>
                            <td>${p.checkOut}</td>
                            <td>${p.ospiteNome ?? ''}</td>
                            <td>${p.emailOspite ?? ''}</td>
                            <td>${p.telefonoOspite ?? ''}</td>
                            <td>${p.prezzoTotale ?? ''}</td>
                            <td>${p.caparra ?? ''}</td>
                            <td>${p.note ?? ''}</td>
                            <td>${p.createdAt ? new Date(p.createdAt).toLocaleString() : ''}</td>
                            <td>
                                <button class="btn" style="padding:4px 10px;font-size:0.95rem;" onclick='openEditModal(${JSON.stringify(p)})'>Modifica</button>
                                <button class="btn" style="padding:4px 10px;font-size:0.95rem;background:#e74c3c;" onclick='deletePrenotazione("${p.id}")'>Elimina</button>
                            </td>
                        `;
                        body.appendChild(tr);
                    });
                })
                .catch(() => showNotification('Errore nel caricamento prenotazioni.'));
            }

                // Elimina prenotazione
                function deletePrenotazione(id) {
                    if (!confirm('Sei sicuro di voler eliminare questa prenotazione?')) return;
                    fetch(`${API_BASE}/admin/prenotazioni/${id}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            ...(adminToken ? { 'Authorization': 'Bearer ' + adminToken } : {})
                        }
                    })
                    .then(res => {
                        if(res.ok) {
                            showNotification('Prenotazione eliminata!');
                            // Ricarica prenotazioni per la casa selezionata
                            const select = document.getElementById('casaSelect');
                            if(select) loadPrenotazioni(select.value);
                        } else {
                            showNotification('Errore nell\'eliminazione.');
                        }
                    })
                    .catch(() => showNotification('Errore di rete.'));
                }

        
                   // Modale nuova prenotazione
                function openNewPrenotazioneModal() {
                         document.getElementById('newPrenotazioneId').value = '';
                         document.getElementById('newPrenotazioneCheckIn').value = '';
                         document.getElementById('newPrenotazioneCheckOut').value = '';
                         document.getElementById('newPrenotazioneOspiteNome').value = '';
                         document.getElementById('newPrenotazioneEmailOspite').value = '';
                         document.getElementById('newPrenotazioneTelefonoOspite').value = '';
                         document.getElementById('newPrenotazionePrezzoTotale').value = '';
                         document.getElementById('newPrenotazioneCaparra').value = '';
                         document.getElementById('newPrenotazioneNote').value = '';
                         document.getElementById('newPrenotazioneModal').style.display = 'flex';
                }
                 

        // --- Gestione modale modifica ---
        function openEditModal(prenotazione) {
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('editId').value = prenotazione.id;
            document.getElementById('editCheckIn').value = prenotazione.checkIn || '';
            document.getElementById('editCheckOut').value = prenotazione.checkOut || '';
            document.getElementById('editOspiteNome').value = prenotazione.ospiteNome || '';
            document.getElementById('editEmailOspite').value = prenotazione.emailOspite || '';
            document.getElementById('editTelefonoOspite').value = prenotazione.telefonoOspite || '';
            document.getElementById('editPrezzoTotale').value = prenotazione.prezzoTotale || '';
            document.getElementById('editCaparra').value = prenotazione.caparra || '';
            document.getElementById('editNote').value = prenotazione.note || '';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function closeNewPrenotazioneModal() {
            document.getElementById('newPrenotazioneModal').style.display = 'none';
        }

        // Salva la modifica
        document.addEventListener('DOMContentLoaded', function() {
            const editForm = document.getElementById('editForm');
            if (editForm) {
                editForm.onsubmit = function(e) {
                    e.preventDefault();
                    const id = document.getElementById('editId').value;
                    // Adatta i dati per PrenotazioneDTO
                    const checkIn = document.getElementById('editCheckIn').value;
                    const checkOut = document.getElementById('editCheckOut').value;
                    const prezzoTotale = document.getElementById('editPrezzoTotale').value;
                    const caparra = document.getElementById('editCaparra').value;
                    const data = {
                        checkIn: checkIn ? checkIn : null, // yyyy-MM-dd
                        checkOut: checkOut ? checkOut : null,
                        ospiteNome: document.getElementById('editOspiteNome').value || null,
                        emailOspite: document.getElementById('editEmailOspite').value || null,
                        telefonoOspite: document.getElementById('editTelefonoOspite').value || null,
                        prezzoTotale: prezzoTotale !== '' ? parseFloat(prezzoTotale) : null,
                        caparra: caparra !== '' ? parseFloat(caparra) : null,
                        note: document.getElementById('editNote').value || null
                    };
                    fetch(`${API_BASE}/admin/prenotazioni/${id}`, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            ...(adminToken ? { 'Authorization': 'Bearer ' + adminToken } : {})
                        },
                        body: JSON.stringify(data)
                    })
                    .then(res => {
                        if(res.ok) {
                            showNotification('Prenotazione aggiornata!');
                            closeEditModal();
                            // Ricarica prenotazioni per la casa selezionata
                            const select = document.getElementById('casaSelect');
                            if(select) loadPrenotazioni(select.value);
                        } else {
                            showNotification('Errore nel salvataggio.');
                        }
                    })
                    .catch(() => showNotification('Errore di rete.'));
                }
            }
        });

                // Salva la modifica
        document.addEventListener('DOMContentLoaded', function() {
            const newPrenotazioneForm = document.getElementById('newPrenotazioneForm');
            if (newPrenotazioneForm) {
                newPrenotazioneForm.onsubmit = function(e) {
                    e.preventDefault();
                    const id = document.getElementById('newPrenotazioneId').value;
                    // Adatta i dati per PrenotazioneDTO
                    const checkIn = document.getElementById('newPrenotazioneCheckIn').value;
                    const checkOut = document.getElementById('newPrenotazioneCheckOut').value;
                    const prezzoTotale = document.getElementById('newPrenotazionePrezzoTotale').value;
                    const caparra = document.getElementById('newPrenotazioneCaparra').value;
                    const casaSelect = document.getElementById('casaSelect');
                    const data = {
                        casaId: casaSelect ? casaSelect.value : null,
                        checkIn: checkIn ? checkIn : null, // yyyy-MM-dd
                        checkOut: checkOut ? checkOut : null,
                        ospiteNome: document.getElementById('newPrenotazioneOspiteNome').value || null,
                        emailOspite: document.getElementById('newPrenotazioneEmailOspite').value || null,
                        telefonoOspite: document.getElementById('newPrenotazioneTelefonoOspite').value || null,
                        prezzoTotale: prezzoTotale !== '' ? parseFloat(prezzoTotale) : null,
                        caparra: caparra !== '' ? parseFloat(caparra) : null,
                        note: document.getElementById('newPrenotazioneNote').value || null
                    };
                    fetch(`${API_BASE}/admin/prenotazioni/${id}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...(adminToken ? { 'Authorization': 'Bearer ' + adminToken } : {})
                        },
                        body: JSON.stringify(data)
                    })
                    .then(res => {
                        if(res.ok) {
                            showNotification('Prenotazione creata!');
                            closeNewPrenotazioneModal();
                            // Ricarica prenotazioni per la casa selezionata
                            const select = document.getElementById('casaSelect');
                            if(select) loadPrenotazioni(select.value);
                        } else {
                            showNotification('Errore nel salvataggio.');
                        }
                    })
                    .catch(() => showNotification('Errore di rete.'));
                }
            }
        });

        // Espone le funzioni globali
        window.loginAdmin = loginAdmin;
        window.openEditModal = openEditModal;
        window.closeNewPrenotazioneModal = closeNewPrenotazioneModal;
        window.deletePrenotazione = deletePrenotazione;

        // Cambia casa selezionata
        document.addEventListener('DOMContentLoaded', function() {
            const select = document.getElementById('casaSelect');
            if (select) {
                select.addEventListener('change', function() {
                    loadPrenotazioni(this.value);
                });
            }
        });

        // --- Funzioni richieste admin rimosse ---
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Admin - Gestione Richieste</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e3e9f7 0%, #f7fafd 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            width: 100vw;
            min-height: 80vh;
            margin: 0;
            background: #fff;
            padding: 40px 4vw 32px 4vw;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        h1 {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }
        h2 {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 24px;
            color: #2d3a4a;
        }
        .login-form, .admin-panel {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            margin: 12px 0 18px 0;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            font-size: 1rem;
            background: #f7fafd;
            transition: border 0.2s;
        }
        .login-form input:focus {
            border: 1.5px solid #007bff;
            outline: none;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(90deg, #007bff 60%, #4f8cff 100%);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,123,255,0.07);
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn:disabled {
            background: #b0b8c9;
            cursor: not-allowed;
        }
        label {
            font-weight: 500;
            color: #2d3a4a;
            margin-bottom: 6px;
            display: block;
        }
        #casaSelect {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cfd8dc;
            font-size: 1rem;
            margin-bottom: 24px;
            background: #f7fafd;
        }
        .requests-table {
            width: 98%;
            max-width: 1100px;
            margin: 18px auto 0 auto;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(60,80,120,0.07);
            font-size: 1.08rem;
            display: block;
        }
        .requests-table th, .requests-table td {
            border: 1px solid #e3e9f7;
            padding: 14px 14px;
            text-align: left;
            min-width: 120px;
        }
        .requests-table th {
            background: #f0f4fa;
            color: #2d3a4a;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .requests-table tr:nth-child(even) {
            background: #f7fafd;
        }
        .requests-table tr:hover {
            background: #e3e9f7;
        }
        .actions button {
            margin-right: 6px;
        }
        .notification {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 18px;
            display: none;
            font-size: 1rem;
        }
        @media (max-width: 1100px) {
            .requests-table {
                width: 99vw;
            }
        }
        @media (max-width: 800px) {
            .container {
                width: 100vw;
                padding: 12px 2vw 18px 2vw;
            }
            .login-form, .admin-panel {
                max-width: 100vw;
                padding: 0;
            }
            .requests-table th, .requests-table td {
                padding: 7px 4px;
                font-size: 0.97rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Area Admin</h1>
        <div class="notification" id="notification"></div>
        <div class="login-form" id="loginForm">
            <input type="password" id="adminPassword" placeholder="Password admin">
            <button class="btn" onclick="loginAdmin()">Accedi</button>
        </div>
        <div class="admin-panel" id="adminPanel" style="display:none;">
            <h2>Prenotazioni per Casa</h2>
            <label for="casaSelect">Seleziona una casa:</label>
            <select id="casaSelect" style="margin-bottom:20px; width:100%; padding:8px;"></select>
            <button class="btn" style="margin-bottom:18px; float:right;" onclick="openNewPrenotazioneModal()">+ Aggiungi Prenotazione</button>
            <table class="requests-table" id="prenotazioniTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Check-in</th>
                        <th>Check-out</th>
                        <th>Ospite</th>
                        <th>Email</th>
                        <th>Telefono</th>
                        <th>Prezzo</th>
                        <th>Caparra</th>
                        <th>Note</th>
                        <th>Creato il</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="prenotazioniBody">
                    <!-- Prenotazioni caricate qui -->
                </tbody>
            </table>
        </div>
        <!-- Modale modifica prenotazione -->
        <div id="editModal" class="modal-fade" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(44,62,80,0.25); z-index:1000; align-items:center; justify-content:center; overflow:auto;">
            <div class="modal-content-pro" style="background:#fff; padding:0 0 18px 0; border-radius:16px; max-width:420px; width:96vw; margin:auto; box-shadow:0 8px 32px rgba(44,62,80,0.18), 0 1.5px 8px rgba(0,0,0,0.08); position:relative; max-height:92vh; overflow-y:auto; border:1.5px solid #e3e9f7; animation: modalFadeIn 0.25s; display:flex; flex-direction:column;">
                <div style="display:flex; align-items:center; justify-content:space-between; padding:22px 28px 0 28px; border-radius:16px 16px 0 0; background:linear-gradient(90deg,#f7fafd 60%,#e3e9f7 100%); border-bottom:1px solid #e3e9f7;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:1.5rem; color:#007bff;">&#9998;</span>
                        <h3 style="margin:0; font-size:1.18rem; font-weight:600; color:#2d3a4a;">Modifica Prenotazione</h3>
                    </div>
                    <button type="button" onclick="closeEditModal()" style="background:none; border:none; font-size:1.5rem; color:#b0b8c9; cursor:pointer; margin-left:8px;" title="Chiudi">&times;</button>
                </div>
                <form id="editForm" style="padding:22px 28px 0 28px;">
                    <input type="hidden" id="editId"/>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Check-in</label>
                        <input type="date" id="editCheckIn" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Check-out</label>
                        <input type="date" id="editCheckOut" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Ospite</label>
                        <input type="text" id="editOspiteNome" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Email</label>
                        <input type="email" id="editEmailOspite" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Telefono</label>
                        <input type="text" id="editTelefonoOspite" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Prezzo</label>
                        <input type="number" id="editPrezzoTotale" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Caparra</label>
                        <input type="number" id="editCaparra" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Note</label>
                        <textarea id="editNote" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc; min-height:60px;"></textarea>
                    </div>
                    <div style="text-align:right; margin-top:10px;">
                        <button type="button" class="btn" onclick="closeEditModal()" style="background:#b0b8c9; margin-right:8px;">Annulla</button>
                        <button type="submit" class="btn">Salva</button>
                    </div>
                </form>
            </div>
        </div>


        <!-- Modale nuova prenotazione -->
         <div id="newPrenotazioneModal" class="modal-fade" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(44,62,80,0.25); z-index:1000; align-items:center; justify-content:center; overflow:auto;">
           
       
            <div class="modal-content-pro" style="background:#fff; padding:0 0 18px 0; border-radius:16px; max-width:420px; width:96vw; margin:auto; box-shadow:0 8px 32px rgba(44,62,80,0.18), 0 1.5px 8px rgba(0,0,0,0.08); position:relative; max-height:92vh; overflow-y:auto; border:1.5px solid #e3e9f7; animation: modalFadeIn 0.25s; display:flex; flex-direction:column;">
                <div style="display:flex; align-items:center; justify-content:space-between; padding:22px 28px 0 28px; border-radius:16px 16px 0 0; background:linear-gradient(90deg,#f7fafd 60%,#e3e9f7 100%); border-bottom:1px solid #e3e9f7;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:1.5rem; color:#007bff;">&#9998;</span>
                        <h3 style="margin:0; font-size:1.18rem; font-weight:600; color:#2d3a4a;">Nuova Prenotazione</h3>
                    </div>
                    <button type="button" onclick="closeNewPrenotazioneModal()" style="background:none; border:none; font-size:1.5rem; color:#b0b8c9; cursor:pointer; margin-left:8px;" title="Chiudi">&times;</button>
                </div>
                <form id="newPrenotazioneForm" style="padding:22px 28px 0 28px;">
                    <input type="hidden" id="newPrenotazioneId"/>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Check-in</label>
                        <input type="date" id="newPrenotazioneCheckIn" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Check-out</label>
                        <input type="date" id="newPrenotazioneCheckOut" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Ospite</label>
                        <input type="text" id="newPrenotazioneOspiteNome" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Email</label>
                        <input type="email" id="newPrenotazioneEmailOspite" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Telefono</label>
                        <input type="text" id="newPrenotazioneTelefonoOspite" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Prezzo</label>
                        <input type="number" id="newPrenotazionePrezzoTotale" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Caparra</label>
                        <input type="number" id="newPrenotazioneCaparra" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc;"/>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="margin-bottom:4px;">Note</label>
                        <textarea id="newPrenotazioneNote" style="width:100%;padding:10px; border-radius:7px; border:1px solid #cfd8dc; min-height:60px;"></textarea>
                    </div>
                    <div style="text-align:right; margin-top:10px;">
                        <button type="button" class="btn" onclick="closeNewPrenotazioneModal()" style="background:#b0b8c9; margin-right:8px;">Annulla</button>
                        <button type="submit" class="btn">Salva</button>
                    </div>
                </form>
        </div>
        <style>
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-fade[style*="display: flex"] {
            animation: modalFadeIn 0.25s;
        }
        .modal-content-pro::-webkit-scrollbar {
            width: 7px;
            background: #f0f4fa;
        }
        .modal-content-pro::-webkit-scrollbar-thumb {
            background: #e3e9f7;
            border-radius: 8px;
        }
        </style>
    </div>
</body>
</html>
